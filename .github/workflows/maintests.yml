name: Main Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - '**.json'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/maintests.yml'
      - '.github/workflows/prtests.yml'
      - '.github/workflows/release.yml'
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.0
        with:
          extra_args: --all-files

  build:
    runs-on: self-hosted
    env:
      HORDELIB_CI_ONGOING: "1"
      TESTS_ONGOING: "1"
      CIVIT_API_TOKEN: ${{ secrets.CIVIT_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # One sync builds the single test venv with the CUDA build of torch; every later
      # step uses --no-sync so it can never re-resolve and drop the cu128 extra.
      - name: Sync test environment (CUDA torch)
        run: uv sync --extra cu128
      - name: Confirm CUDA is available on host
        run: uv run --no-sync pytest -x -k test_cuda tests
      - name: Run unit tests
        run: |
          uv run --no-sync pytest -x tests/meta -k test_no_initialise_comfy_horde
          uv run --no-sync pytest -x tests --cov --ignore=tests/meta --durations=20
      - name: Create CI webpage of results
        run: uv run --no-sync python -m examples.make_index
      - name: Upload to S3
        uses: shallwefootball/s3-upload-action@master
        id: S3
        with:
          aws_key_id: ${{secrets.S3_BUILD_ARTIFACTS_ACCESS_KEY_ID}}
          aws_secret_access_key: ${{secrets.S3_BUILD_ARTIFACTS_SECRET_ACCESS_KEY}}
          aws_bucket: hordelib
          endpoint: ${{secrets.S3_ENDPOINT}}
          source_dir: images/
          destination_dir: ''
